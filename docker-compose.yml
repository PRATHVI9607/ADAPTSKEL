name: ADAPTSKEL_minimal

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ADAPTSKEL_minimal_backend
    ports:
      - "8001:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
      - ENV=development
    volumes:
      - ./benchmarks/results:/app/benchmarks/results
      - ./core/python:/app/core/python
      - ./app/backend:/app/app/backend
    networks:
      - adaptskel-net
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: ADAPTSKEL_minimal_frontend
    ports:
      - "5174:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://localhost:8001
      - NODE_ENV=development
    volumes:
      - ./app/frontend/src:/app/src
    networks:
      - adaptskel-net

  db:
    image: postgres:15-alpine
    container_name: ADAPTSKEL_minimal_db
    environment:
      - POSTGRES_USER=adaptskel
      - POSTGRES_PASSWORD=adaptskel_dev
      - POSTGRES_DB=adaptskel_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - adaptskel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adaptskel"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  adaptskel-net:
    driver: bridge

volumes:
  postgres_data:
